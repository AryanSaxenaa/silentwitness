server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large video uploads (up to 4GB)
    client_max_body_size 4096m;

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Generous timeouts for long-running operations:
        # - Video upload + indexing (large files, background tasks)
        # - Whisper transcription (CPU-bound, may take 5-30s)
        # - CLIP embedding on first use (model warm-up)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming-friendly responses
        proxy_buffering off;
    }

    location /thumbnails/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;

        # Cache thumbnails aggressively — they are immutable (UUID filenames)
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
