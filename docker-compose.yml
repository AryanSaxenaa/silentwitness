services:
  vectoraidb:
    image: williamimoh/actian-vectorai-db:latest
    container_name: vectoraidb
    ports:
      - "50051:50051"
    volumes:
      - ./data/vectorai:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "echo ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: silentwitness-backend
    ports:
      - "8000:8000"
    volumes:
      - ./footage:/app/footage # mount local footage folder
      - ./data/index:/app/data # frame thumbnails + metadata cache
    environment:
      - VECTORAI_HOST=vectoraidb
      - VECTORAI_PORT=50051
      - FOOTAGE_DIR=/app/footage
      - DATA_DIR=/app/data
      - FRAME_RATE=1 # frames per second to index
      - MOTION_THRESHOLD=25 # pixel diff threshold for motion detection
    depends_on:
      vectoraidb:
        condition: service_healthy
    restart: unless-stopped

  backend-dev-fast:
    profiles: ["dev-fast"]
    build:
      context: ./backend
      args:
        - PRELOAD_MODELS=0
    container_name: silentwitness-backend-dev-fast
    ports:
      - "8001:8000"
    volumes:
      - ./footage:/app/footage # mount local footage folder
      - ./data/index:/app/data # frame thumbnails + metadata cache
    environment:
      - VECTORAI_HOST=vectoraidb
      - VECTORAI_PORT=50051
      - FOOTAGE_DIR=/app/footage
      - DATA_DIR=/app/data
      - FRAME_RATE=1 # frames per second to index
      - MOTION_THRESHOLD=25 # pixel diff threshold for motion detection
    depends_on:
      vectoraidb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # VITE_API_URL is a build-time variable baked into the JS bundle by Vite.
      # Passing it as a runtime env var to the nginx container has no effect.
      # The nginx.conf proxies /api/ and /thumbnails/ to http://backend:8000
      # so no VITE_API_URL is needed at all — the browser uses relative paths.
      args:
        - VITE_API_URL=
    container_name: silentwitness-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
